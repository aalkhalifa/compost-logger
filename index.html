*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000;color:#fff;font-family:Inter,sans-serif;min-height:100vh}

.card{background:#0a0a0a;border:1px solid #1e1e1e;border-radius:4px;padding:1rem;margin-bottom:1rem}
.lbl{display:block;font-size:0.65rem;letter-spacing:0.1em;color:#555;font-weight:600;margin-bottom:0.3rem}
input,textarea{background:#050505;border:1px solid #222;border-radius:3px;color:#fff;padding:0.6rem 0.75rem;font-size:0.9rem;font-family:Inter,sans-serif;width:100%;box-sizing:border-box}
input:focus,textarea:focus{border-color:#444;outline:none}
input[type=checkbox]{width:16px;height:16px;accent-color:#4ade80}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:0.5}
.btn{display:block;width:100%;padding:0.75rem;background:#fff;color:#000;border:none;border-radius:3px;font-size:0.85rem;font-weight:600;letter-spacing:0.05em;cursor:pointer;font-family:Inter,sans-serif;text-align:center}
.btn-sm{background:#0a0a0a;border:1px solid #222;color:#666;border-radius:3px;padding:0.3rem 0.75rem;cursor:pointer;font-size:0.72rem;font-family:Inter,sans-serif;white-space:nowrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:0.6rem}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;margin-bottom:0.6rem}
.pbar-wrap{height:5px;background:#111;border-radius:2px;margin-top:0.2rem}
.pbar{height:100%;border-radius:2px;transition:width 0.5s}
.sticky{position:sticky;top:0;background:#000;z-index:100;padding:0.75rem 1rem;border-bottom:1px solid #111;display:flex;justify-content:space-between;align-items:center}
.dropdown-list{position:absolute;top:100%;left:0;right:0;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:3px;z-index:999;max-height:180px;overflow-y:auto;display:none}
.dropdown-list.open{display:block}
.dropdown-item{padding:0.55rem 0.75rem;cursor:pointer;border-bottom:1px solid #111;color:#bbb;font-size:0.85rem}
.dropdown-item:hover{background:#111}
.wrap{padding:1rem;max-width:700px;margin:0 auto}
.hidden{display:none}
.warn-banner{background:#ff0000;color:#fff;padding:1rem;text-align:center;font-weight:bold;font-size:1rem;letter-spacing:0.05em;margin-bottom:1rem;border-radius:4px;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:0.45rem 0;border-bottom:1px solid #0f0f0f}

<script>
// ── CONSTANTS ──
const CLIENT_ID = "646828694419-0j8orsi53atb5dcl1an2h0adnusaddhn.apps.googleusercontent.com";
const BANDS = [
  {min:131,max:149,hours:72,label:"Stage 1",color:"#f59e0b"},
  {min:150,max:155,hours:48,label:"Stage 2",color:"#f97316"},
  {min:156,max:164,hours:24,label:"Stage 3",color:"#ef4444"},
  {min:165,max:174,hours:12,label:"Stage 4",color:"#dc2626"},
  {min:175,max:Infinity,hours:0,label:"TURN NOW",color:"#ff0000"},
];
const CATS = [
  {key:"highN",label:"HIGH NITROGEN",sub:"Manures, seeds, meals",color:"#ef4444"},
  {key:"greens",label:"GREENS",sub:"Grass, alfalfa, kitchen",color:"#4ade80"},
  {key:"browns",label:"BROWNS",sub:"Wood chips, leaves, straw",color:"#d97706"},
];
const DEF_HIST = {
  highN:["Chicken manure","Blood meal","Fish meal","Horse manure","Cow manure","Feather meal"],
  greens:["Alfalfa","Grass clippings","Kitchen scraps","Coffee grounds","Fresh leaves","Seaweed"],
  browns:["Wood chips","Dry leaves","Cardboard","Straw","Sawdust","Hay"],
};

// ── STATE ──
let piles=[], recipes=[], ingHist=JSON.parse(JSON.stringify(DEF_HIST));
let activeId=null, tempMode="three";
let tempChart=null, moistChart=null;
let driveToken=null, driveFileId=null, driveStatus="disconnected";
let tokenClient=null, saveTimer=null, timerInterval=null;
let newMaterials={highN:[],greens:[],browns:[]};

// ── UTILS ──
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const newItem=()=>({id:uid(),name:"",volume:"",notes:""});
const newMats=()=>({highN:[newItem()],greens:[newItem()],browns:[newItem()]});
const totVol=m=>Object.values(m).flat().reduce((s,i)=>s+(parseFloat(i.volume)||0),0);
const catVol=items=>items.reduce((s,i)=>s+(parseFloat(i.volume)||0),0);
function getBand(t){if(!t||t<131)return null;return BANDS.find(b=>t>=b.min&&t<=b.max)||null;}
function mColor(p){if(!p)return"#222";if(p>=60)return"#1565c0";if(p>=50)return"#1e88e5";if(p>=40)return"#4a90d9";return"#7ab3e0";}
function fmtHours(ms){const h=Math.floor(ms/3600000);const m=Math.round((ms%3600000)/60000);return h+"h "+m+"m";}
function fmtDate(d){return d.toLocaleDateString()+" "+d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});}

// ── TIMER CALCULATION ──
function calcTimer(entries){
  if(!entries.length)return null;
  const s=[...entries].sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const lat=s[s.length-1];
  const band=getBand(lat.core);
  if(!band)return null;
  if(band.hours===0)return{band,turnNow:true,deadline:null,progress:100,remaining:0,elapsed:0};
  let streak=new Date(lat.ts);
  for(let i=s.length-2;i>=0;i--){
    const b=getBand(s[i].core);
    if(!b||b.label!==band.label)break;
    streak=new Date(s[i].ts);
  }
  const elapsed=(Date.now()-streak)/3600000;
  const remaining=Math.max(0,band.hours-elapsed);
  const progress=Math.min(100,elapsed/band.hours*100);
  const deadline=new Date(streak.getTime()+band.hours*3600000);
  return{band,elapsed,remaining,progress,complete:elapsed>=band.hours,turnNow:false,deadline};
}

// Hours since last turn
function hoursSinceLastTurn(entries){
  const turns=[...entries].filter(e=>e.turned).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  if(!turns.length)return null;
  return Date.now()-new Date(turns[0].ts);
}

// ── PERSIST ──
function save(){
  localStorage.setItem("ca_v4",JSON.stringify({piles,recipes,ingHist}));
  scheduleDriveSave();
}
function load(){
  const s=localStorage.getItem("ca_v4");
  if(s){try{const d=JSON.parse(s);piles=d.piles||[];recipes=d.recipes||[];ingHist=d.ingHist||DEF_HIST;}catch(e){}}
}

// ── VIEWS ──
function showView(v){
  ["home","setup","dashboard"].forEach(x=>{
    document.getElementById("view-"+x).classList.add("hidden");
  });
  document.getElementById("view-"+v).classList.remove("hidden");
  if(v==="home"){clearInterval(timerInterval);renderHome();}
  if(v==="setup"){clearInterval(timerInterval);renderSetup();}
  if(v==="dashboard") renderDashboard();
}

// ── HOME ──
function renderHome(){
  updateDriveUI();
  const el=document.getElementById("pile-list");
  if(!piles.length){
    el.innerHTML='<div style="text-align:center;padding:3rem 1rem;border:1px dashed #1a1a1a;border-radius:4px"><div style="font-size:2rem;margin-bottom:0.5rem">🌱</div><div class="hd" style="font-size:1.2rem;color:#333">NO PILES YET</div><div style="font-size:0.8rem;color:#333;margin-top:0.5rem">Create your first compost pile</div></div>';
    return;
  }
  el.innerHTML=piles.map(p=>{
    const sorted=[...p.entries].sort((a,b)=>new Date(a.ts)-new Date(b.ts));
    const lat=sorted[sorted.length-1];
    const t=calcTimer(p.entries);
    const band=lat?getBand(lat.core):null;
    const sinceMs=hoursSinceLastTurn(p.entries);
    let timerHtml="";
    if(t&&!t.turnNow){
      const label=t.complete?"READY ✓":Math.floor(t.remaining)+"h "+Math.round((t.remaining%1)*60)+"m LEFT";
      timerHtml=`<div style="margin-top:0.75rem">
        <div style="display:flex;justify-content:space-between;margin-bottom:0.3rem">
          <span class="mono" style="font-size:0.65rem;color:${t.band.color}">${t.band.label}</span>
          <span class="mono" style="font-size:0.65rem;color:${t.complete?"#4ade80":"#666"}">${label}</span>
        </div>
        <div class="pbar-wrap"><div class="pbar" style="width:${t.progress}%;background:${t.complete?"#4ade80":t.band.color}"></div></div>
      </div>`;
    } else if(t?.turnNow){
      timerHtml=`<div class="mono" style="margin-top:0.5rem;color:#ff0000;font-size:0.85rem">⚠ TURN NOW!</div>`;
    }
    const sinceHtml=sinceMs!==null
      ?`<div class="mono" style="font-size:0.6rem;color:#444;margin-top:0.3rem">LAST TURN: ${fmtHours(sinceMs)} AGO</div>`
      :`<div class="mono" style="font-size:0.6rem;color:#333;margin-top:0.3rem">NO TURN RECORDED</div>`;
    return `<div class="card" style="cursor:pointer;border-left:3px solid ${band?band.color:"#222"}" onclick="openPile('${p.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="hd" style="font-size:1.3rem;color:#fff">${p.name}</div>
          <div class="mono" style="font-size:0.62rem;color:#444;margin-top:0.15rem">DAY ${p.entries.length} · ${new Date(p.created).toLocaleDateString()}</div>
          ${sinceHtml}
        </div>
        <div style="text-align:right">
          <div class="mono" style="font-size:1.5rem;color:${band?band.color:"#333"};font-weight:bold">${lat&&lat.core?lat.core+"°":"–"}</div>
          <div style="font-size:0.58rem;color:#444;font-family:'Share Tech Mono',monospace">CORE</div>
        </div>
      </div>
      ${timerHtml}
    </div>`;
  }).join("");
}

function openPile(id){activeId=id;showView("dashboard");}

// ── SETUP ──
function renderSetup(){
  newMaterials=newMats();
  document.getElementById("new-pile-name").value="";
  renderCatEditors();
  renderRecipesPanel();
}

function renderCatEditors(){
  document.getElementById("cat-editors").innerHTML=CATS.map(cat=>`
    <div style="margin-bottom:1.5rem">
      <div style="display:flex;justify-content:space-between;margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:1px solid #111">
        <div>
          <span class="hd" style="font-size:1rem;color:${cat.color}">${cat.label}</span>
          <span style="font-size:0.7rem;color:#444;margin-left:0.5rem">${cat.sub}</span>
        </div>
        <span class="mono" style="font-size:0.75rem;color:#444" id="catvol-${cat.key}">0.0 gal</span>
      </div>
      <div id="items-${cat.key}"></div>
      <button onclick="addCatItem('${cat.key}')" style="width:100%;padding:0.45rem;background:none;border:1px dashed #222;border-radius:3px;color:${cat.color};cursor:pointer;font-size:0.75rem;font-family:Inter,sans-serif">
        + ADD ${cat.label} INGREDIENT
      </button>
    </div>`).join("");
  CATS.forEach(cat=>renderCatItems(cat));
}

function renderCatItems(cat){
  const el=document.getElementById("items-"+cat.key);
  if(!el)return;
  el.innerHTML=newMaterials[cat.key].map(item=>`
    <div style="background:#050505;border:1px solid #111;border-radius:3px;padding:0.75rem;margin-bottom:0.5rem">
      <div style="display:grid;grid-template-columns:1fr 90px 32px;gap:0.5rem;margin-bottom:0.5rem;align-items:end">
        <div style="position:relative">
          <label class="lbl">INGREDIENT</label>
          <input value="${item.name}" placeholder="${cat.key==='highN'?'e.g. Chicken manure':cat.key==='greens'?'e.g. Alfalfa':'e.g. Wood chips'}"
            id="iname-${item.id}"
            oninput="updateItem('${cat.key}','${item.id}','name',this.value);showSugg('${cat.key}','${item.id}')"
            onfocus="showSugg('${cat.key}','${item.id}')"
            onblur="setTimeout(()=>hideSugg('${item.id}'),200)"/>
          <div id="sugg-${item.id}" class="dropdown-list"></div>
        </div>
        <div>
          <label class="lbl">GALLONS</label>
          <input type="number" value="${item.volume}" placeholder="0" id="ivol-${item.id}"
            oninput="updateItem('${cat.key}','${item.id}','volume',this.value)"/>
        </div>
        <button onclick="removeCatItem('${cat.key}','${item.id}')"
          style="background:none;border:1px solid #222;color:#444;cursor:pointer;border-radius:3px;width:32px;height:38px;font-size:0.9rem;align-self:end">✕</button>
      </div>
      <label class="lbl">NOTES</label>
      <input value="${item.notes}" placeholder="Source, condition, smell..." id="inote-${item.id}"
        oninput="updateItem('${cat.key}','${item.id}','notes',this.value)"/>
    </div>`).join("");
  updateCatVol(cat.key);
}

function showSugg(catKey,itemId){
  const q=document.getElementById("iname-"+itemId)?.value||"";
  const h=ingHist[catKey]||[];
  const sugg=q?h.filter(x=>x.toLowerCase().includes(q.toLowerCase())&&x.toLowerCase()!==q.toLowerCase()).slice(0,8):h.slice(0,8);
  const el=document.getElementById("sugg-"+itemId);
  if(!el)return;
  if(!sugg.length){el.classList.remove("open");return;}
  el.innerHTML=sugg.map(s=>`<div class="dropdown-item" onmousedown="pickSugg('${catKey}','${itemId}','${s.replace(/'/g,"\\'")}')"> ${s}</div>`).join("");
  el.classList.add("open");
}
function hideSugg(id){const el=document.getElementById("sugg-"+id);if(el)el.classList.remove("open");}
function pickSugg(catKey,itemId,val){
  updateItem(catKey,itemId,"name",val);
  const inp=document.getElementById("iname-"+itemId);
  if(inp)inp.value=val;
  hideSugg(itemId);
}
function updateItem(catKey,itemId,field,val){
  const item=newMaterials[catKey].find(i=>i.id===itemId);
  if(item){item[field]=val;if(field==="volume")updateCatVol(catKey);}
  updateTotalVol();
}
function updateCatVol(catKey){
  const el=document.getElementById("catvol-"+catKey);
  if(el)el.textContent=catVol(newMaterials[catKey]).toFixed(1)+" gal";
}
function updateTotalVol(){
  const el=document.getElementById("total-vol");
  if(el)el.textContent=totVol(newMaterials).toFixed(1)+" GAL";
}
function addCatItem(catKey){newMaterials[catKey].push(newItem());renderCatItems(CATS.find(c=>c.key===catKey));}
function removeCatItem(catKey,itemId){
  newMaterials[catKey]=newMaterials[catKey].filter(i=>i.id!==itemId);
  renderCatItems(CATS.find(c=>c.key===catKey));
}

function renderRecipesPanel(){
  const panel=document.getElementById("recipes-panel");
  if(!recipes.length){panel.classList.add("hidden");return;}
  panel.classList.remove("hidden");
  document.getElementById("recipes-list").innerHTML=recipes.map(r=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0;border-top:1px solid #111">
      <div>
        <div style="font-size:0.85rem;color:#ccc">${r.name}</div>
        <div class="mono" style="font-size:0.62rem;color:#444">${totVol(r.materials).toFixed(1)} gal · ${r.saved}</div>
      </div>
      <button class="btn-sm" onclick="loadRecipe('${r.id}')">LOAD</button>
    </div>`).join("");
}

function loadRecipe(id){
  const r=recipes.find(x=>x.id===id);
  if(!r)return;
  newMaterials=JSON.parse(JSON.stringify(r.materials));
  CATS.forEach(cat=>renderCatItems(cat));
  updateTotalVol();
}

function createPile(){
  const name=document.getElementById("new-pile-name").value.trim();
  if(!name)return alert("Please enter a pile name");
  CATS.forEach(cat=>newMaterials[cat.key].forEach(i=>{if(i.name)addToHist(cat.key,i.name);}));
  const pile={id:uid(),name,created:new Date().toISOString(),
    materials:JSON.parse(JSON.stringify(newMaterials)),entries:[]};
  piles.push(pile);activeId=pile.id;
  save();showView("dashboard");
}

// ── DASHBOARD ──
function getActivePile(){return piles.find(p=>p.id===activeId)||null;}

function renderDashboard(){
  const pile=getActivePile();
  if(!pile)return showView("home");
  const sorted=[...pile.entries].sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const lat=sorted[sorted.length-1];
  const band=lat?getBand(lat.core):null;

  document.getElementById("dash-name").textContent=pile.name;
  document.getElementById("dash-sub").textContent="DAY "+pile.entries.length+" · "+driveLabelShort();
  document.getElementById("dash-core").textContent=lat&&lat.core?lat.core+"°F":"–";
  document.getElementById("dash-core").style.color=band?band.color:"#333";

  // Set form defaults
  const now=new Date();
  document.getElementById("f-date").value=now.toISOString().split("T")[0];
  document.getElementById("f-time").value=now.toTimeString().slice(0,5);
  document.getElementById("f-turned").onchange=function(){
    document.getElementById("turned-lbl").style.color=this.checked?"#4ade80":"#444";
  };

  // Warning banner
  const warn=document.getElementById("warn-banner");
  if(lat&&lat.core>=175){warn.classList.remove("hidden");}
  else{warn.classList.add("hidden");}

  renderStatusCard(pile,sorted,lat,band);
  renderTimer(pile);
  renderCharts(sorted);
  renderRecipeSummary(pile);
  renderTempRef();
  renderLogTable(sorted);

  // Live timer update every minute
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    const p=getActivePile();if(!p)return;
    const s=[...p.entries].sort((a,b)=>new Date(a.ts)-new Date(b.ts));
    const l=s[s.length-1];const b=l?getBand(l.core):null;
    renderStatusCard(p,s,l,b);
    renderTimer(p);
  },60000);
}

// ── STATUS CARD ──
function renderStatusCard(pile,sorted,lat,band){
  const el=document.getElementById("status-rows");

  // Hours since last turn
  const sinceMs=hoursSinceLastTurn(pile.entries);
  const sinceStr=sinceMs!==null?fmtHours(sinceMs):"No turn recorded yet";
  const sinceColor=sinceMs!==null?"#fff":"#444";

  // Turn now?
  if(lat&&lat.core>=175){
    el.innerHTML=`
      <div class="stat-row"><span class="stat-label">CURRENT TEMP</span><span class="stat-value" style="color:#ff0000">${lat.core}°F</span></div>
      <div class="stat-row"><span class="stat-label">STAGE</span><span class="stat-value" style="color:#ff0000">TURN NOW!</span></div>
      <div class="stat-row"><span class="stat-label">ACTION</span><span class="stat-value" style="color:#ff0000">TURN IMMEDIATELY</span></div>
      <div class="stat-row"><span class="stat-label">HOURS SINCE LAST TURN</span><span class="stat-value" style="color:${sinceColor}">${sinceStr}</span></div>`;
    document.getElementById("status-card").style.borderColor="#ff0000";
    return;
  }

  if(!lat||!band){
    el.innerHTML=`
      <div class="stat-row"><span class="stat-label">CURRENT TEMP</span><span class="stat-value" style="color:#333">No data yet</span></div>
      <div class="stat-row"><span class="stat-label">HOURS SINCE LAST TURN</span><span class="stat-value" style="color:${sinceColor}">${sinceStr}</span></div>`;
    document.getElementById("status-card").style.borderColor="#222";
    return;
  }

  // Timer calculation for status
  const t=calcTimer(pile.entries);
  const timeCompleted=t?fmtHours(t.elapsed*3600000):"–";
  const timeRemaining=t&&!t.complete?fmtHours(t.remaining*3600000):"Complete ✓";
  const nextDue=t&&t.deadline?fmtDate(t.deadline):"–";
  const action=t?.complete?"CLEAR TO TURN — turn the pile now":
    t?`Wait ${fmtHours(t.remaining*3600000)} more`:"Log entries to activate";

  document.getElementById("status-card").style.borderColor=band.color;
  el.innerHTML=`
    <div class="stat-row"><span class="stat-label">CURRENT TEMP</span><span class="stat-value" style="color:${band.color}">${lat.core}°F</span></div>
    <div class="stat-row"><span class="stat-label">CURRENT STAGE</span><span class="stat-value" style="color:${band.color}">${band.label} (${band.min}–${band.max===Infinity?"+":band.max}°F)</span></div>
    <div class="stat-row"><span class="stat-label">REQUIRED TIME</span><span class="stat-value">${band.hours}h continuous</span></div>
    <div class="stat-row"><span class="stat-label">TIME COMPLETED</span><span class="stat-value" style="color:${t?.complete?"#4ade80":"#fff"}">${timeCompleted}</span></div>
    <div class="stat-row"><span class="stat-label">NEXT TURN DUE</span><span class="stat-value" style="color:${t?.complete?"#4ade80":"#aaa"}">${nextDue}</span></div>
    <div class="stat-row"><span class="stat-label">ACTION</span><span class="stat-value" style="color:${t?.complete?"#4ade80":"#fff"};font-size:0.75rem">${action}</span></div>
    <div class="stat-row"><span class="stat-label">HOURS SINCE LAST TURN</span><span class="stat-value" style="color:${sinceColor}">${sinceStr}</span></div>`;
}

// ── TIMER CARD ──
function renderTimer(pile){
  const t=calcTimer(pile.entries);
  const card=document.getElementById("timer-card");
  const content=document.getElementById("timer-content");

  if(!t){
    card.style.borderLeftColor="#222";
    content.innerHTML='<div class="mono" style="color:#333;font-size:0.78rem;text-align:center">LOG ENTRIES TO ACTIVATE</div>';
    return;
  }
  if(t.turnNow){
    card.style.borderLeftColor="#ff0000";
    content.innerHTML='<div class="hd" style="color:#ff0000;font-size:2rem;text-align:center">TURN NOW!</div>';
    return;
  }
  card.style.borderLeftColor=t.complete?"#4ade80":t.band.color;
  const timeLeft=t.complete?"CLEAR TO TURN ✓":Math.floor(t.remaining)+"h "+Math.round((t.remaining%1)*60)+"m";
  const calBtn=t.deadline
    ?`<button class="btn-sm" onclick="addToCalendar('${pile.name}',${t.deadline.getTime()})" style="margin-top:0.75rem;width:100%;padding:0.55rem">CALENDAR REMINDER — ${fmtDate(t.deadline)}</button>`:"";
  content.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1rem">
      <div>
        <span class="hd" style="color:${t.band.color};font-size:1.2rem">${t.band.label}</span>
        <span class="mono" style="color:#444;font-size:0.7rem;margin-left:0.5rem">${t.band.min}–${t.band.max===Infinity?"+":t.band.max}°F</span>
      </div>
      <span class="${t.complete?"hd":"mono"}" style="color:${t.complete?"#4ade80":"#fff"};font-size:${t.complete?"1rem":"0.95rem"}">${timeLeft}</span>
    </div>
    ${BANDS.filter(b=>b.hours>0).map(band=>{
      const isCur=t.band.label===band.label;
      const pct=isCur?t.progress:0;
      return `<div style="margin-bottom:0.6rem">
        <div style="display:flex;justify-content:space-between;margin-bottom:0.2rem">
          <span class="mono" style="font-size:0.62rem;color:${isCur?band.color:"#222"}">${band.label} · ${band.min}–${band.max===Infinity?"+":band.max}°F · ${band.hours}H</span>
          <span class="mono" style="font-size:0.62rem;color:${isCur?band.color:"#222"}">${isCur?Math.round(pct):0}%</span>
        </div>
        <div class="pbar-wrap"><div class="pbar" style="width:${pct}%;background:${band.color}"></div></div>
      </div>`;
    }).join("")}
    ${calBtn}`;

  if(t.complete&&"Notification"in window&&Notification.permission==="granted"){
    new Notification("Compost Academy",{body:pile.name+" is ready to turn!"});
  }
}

// ── CHARTS ──
function renderCharts(sorted){
  const section=document.getElementById("chart-section");
  if(!sorted.length){section.classList.add("hidden");return;}
  section.classList.remove("hidden");

  const labels=sorted.map((_,i)=>"D"+(i+1));
  const turnDays=sorted.map((e,i)=>e.turned?"D"+(i+1):null).filter(Boolean);

  if(tempChart){tempChart.destroy();tempChart=null;}
  if(moistChart){moistChart.destroy();moistChart=null;}

  // Turn line annotations for temp chart
  const turnAnnotations={};
  turnDays.forEach((d,i)=>{
    turnAnnotations["turn"+i]={
      type:"line",xMin:d,xMax:d,
      borderColor:"#4ade80",borderWidth:2,
      label:{content:"TURN",display:true,position:"start",
        backgroundColor:"transparent",color:"#4ade80",
        font:{size:9,family:"Share Tech Mono, monospace"},
        yAdjust:-8}
    };
  });

  // Danger zone annotation above 175
  const dangerZone={
    type:"box",
    yMin:175,yMax:220,
    backgroundColor:"rgba(255,0,0,0.06)",
    borderColor:"rgba(255,0,0,0.3)",
    borderWidth:1,
    label:{content:"DANGER ZONE",display:true,position:{x:"end",y:"start"},
      backgroundColor:"transparent",color:"rgba(255,0,0,0.4)",
      font:{size:9,family:"Share Tech Mono, monospace"}}
  };

  const datasets=tempMode==="three"?[
    {label:"Core",data:sorted.map(e=>e.core),borderColor:"#f97316",backgroundColor:"#f9731615",tension:0.3,pointRadius:3,pointBackgroundColor:"#f97316",spanGaps:true},
    {label:"Top",data:sorted.map(e=>e.top),borderColor:"#4ade80",backgroundColor:"transparent",tension:0.3,pointRadius:2.5,pointBackgroundColor:"#4ade80",spanGaps:true},
    {label:"Bottom",data:sorted.map(e=>e.bottom),borderColor:"#38bdf8",backgroundColor:"transparent",tension:0.3,pointRadius:2.5,pointBackgroundColor:"#38bdf8",spanGaps:true},
  ]:[
    {label:"Average",data:sorted.map(e=>e.core&&e.top&&e.bottom?+((e.core+e.top+e.bottom)/3).toFixed(1):null),
      borderColor:"#fff",backgroundColor:"#ffffff11",tension:0.3,pointRadius:3,pointBackgroundColor:"#fff",spanGaps:true},
  ];

  tempChart=new Chart(document.getElementById("temp-chart"),{
    type:"line",
    data:{labels,datasets},
    options:{
      responsive:true,animation:false,
      plugins:{
        legend:{labels:{color:"#444",font:{size:11}}},
        annotation:{annotations:{
          r131:{type:"line",yMin:131,yMax:131,borderColor:"#f59e0b88",borderWidth:1,borderDash:[4,4]},
          r150:{type:"line",yMin:150,yMax:150,borderColor:"#f9731688",borderWidth:1,borderDash:[4,4]},
          r165:{type:"line",yMin:165,yMax:165,borderColor:"#ef444488",borderWidth:1,borderDash:[4,4]},
          r175:{type:"line",yMin:175,yMax:175,borderColor:"#ff0000",borderWidth:1.5,borderDash:[4,4]},
          danger:dangerZone,
          ...turnAnnotations
        }}
      },
      scales:{
        x:{ticks:{color:"#444",font:{size:10}},grid:{color:"#111"}},
        y:{min:60,max:220,ticks:{color:"#444",font:{size:10}},grid:{color:"#111"}}
      }
    }
  });

  document.getElementById("turn-legend").style.display=turnDays.length?"block":"none";

  // Moisture chart with turn lines
  const moistTurnAnnotations={};
  turnDays.forEach((d,i)=>{
    moistTurnAnnotations["turn"+i]={type:"line",xMin:d,xMax:d,borderColor:"#4ade80",borderWidth:2};
  });

  moistChart=new Chart(document.getElementById("moist-chart"),{
    type:"line",
    data:{labels,datasets:[{
      label:"Moisture",data:sorted.map(e=>e.moisture),
      borderColor:"#1e88e5",backgroundColor:"#1e88e522",
      fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:"#1e88e5",spanGaps:true
    }]},
    options:{
      responsive:true,animation:false,
      plugins:{
        legend:{labels:{color:"#444",font:{size:11}}},
        annotation:{annotations:{
          r60:{type:"line",yMin:60,yMax:60,borderColor:"#1565c088",borderWidth:1,borderDash:[4,4]},
          r40:{type:"line",yMin:40,yMax:40,borderColor:"#90caf988",borderWidth:1,borderDash:[4,4]},
          ...moistTurnAnnotations
        }}
      },
      scales:{
        x:{ticks:{color:"#444",font:{size:10}},grid:{color:"#111"}},
        y:{min:0,max:100,ticks:{color:"#444",font:{size:10}},grid:{color:"#111"}}
      }
    }
  });
}

function toggleChart(){
  tempMode=tempMode==="three"?"average":"three";
  document.getElementById("btn-toggle-chart").textContent=tempMode==="three"?"SHOW AVG":"SHOW 3 LINES";
  const pile=getActivePile();if(!pile)return;
  const sorted=[...pile.entries].sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  renderCharts(sorted);
}

// ── ENTRY ──
function updateMoistPill(){
  const v=parseFloat(document.getElementById("f-moisture").value);
  const pill=document.getElementById("moist-pill");
  if(!v){pill.innerHTML="";return;}
  pill.innerHTML=`<span style="background:${mColor(v)};color:#fff;padding:0.05rem 0.3rem;border-radius:2px;font-size:0.6rem;font-family:'Share Tech Mono',monospace">${v}%</span>`;
}

function addEntry(){
  const pile=getActivePile();if(!pile)return;
  const core=parseFloat(document.getElementById("f-core").value)||null;
  const top=parseFloat(document.getElementById("f-top").value)||null;
  const bottom=parseFloat(document.getElementById("f-bottom").value)||null;
  if(!core&&!top&&!bottom)return alert("Enter at least one temperature");
  const date=document.getElementById("f-date").value;
  const time=document.getElementById("f-time").value;
  const turned=document.getElementById("f-turned").checked;
  pile.entries.push({id:uid(),ts:new Date(date+"T"+time).toISOString(),
    date,time,core,top,bottom,
    moisture:parseFloat(document.getElementById("f-moisture").value)||null,
    turned,notes:document.getElementById("f-notes").value});
  save();
  document.getElementById("f-core").value="";
  document.getElementById("f-top").value="";
  document.getElementById("f-bottom").value="";
  document.getElementById("f-moisture").value="";
  document.getElementById("f-turned").checked=false;
  document.getElementById("turned-lbl").style.color="#444";
  document.getElementById("f-notes").value="";
  document.getElementById("moist-pill").innerHTML="";
  renderDashboard();
}

function saveRecipe(){
  const pile=getActivePile();if(!pile)return;
  const name=document.getElementById("recipe-name").value.trim();
  if(!name)return;
  recipes.unshift({id:uid(),name,materials:pile.materials,saved:new Date().toLocaleDateString()});
  if(recipes.length>10)recipes.pop();
  document.getElementById("recipe-name").value="";
  save();
}

function addToHist(cat,name){
  if(!name.trim())return;
  if(!ingHist[cat])ingHist[cat]=[];
  if(!ingHist[cat].includes(name))ingHist[cat].unshift(name);
  if(ingHist[cat].length>50)ingHist[cat].pop();
}

function addToCalendar(name,ms){
  const deadline=new Date(ms);
  const fmt=d=>d.toISOString().replace(/[-:.]/g,"").slice(0,15)+"Z";
  const ics=["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT",
    "DTSTART:"+fmt(deadline),"DTEND:"+fmt(new Date(ms+900000)),
    "SUMMARY:Turn "+name,"DESCRIPTION:Compost pile ready to turn",
    "BEGIN:VALARM","TRIGGER:-PT30M","ACTION:DISPLAY","DESCRIPTION:30min reminder","END:VALARM",
    "END:VEVENT","END:VCALENDAR"].join("\r\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([ics],{type:"text/calendar"}));
  a.download="turn-"+name.replace(/\s+/g,"-")+".ics";a.click();
}

// ── GOOGLE DRIVE ──
function driveLabelShort(){
  return{disconnected:"LOCAL ONLY",connecting:"CONNECTING...",connected:"DRIVE SYNCED",error:"SYNC FAILED"}[driveStatus];
}

function updateDriveUI(){
  const colors={disconnected:"#333",connecting:"#f59e0b",connected:"#4ade80",error:"#ef4444"};
  const labels={disconnected:"LOCAL ONLY",connecting:"CONNECTING...",connected:"GOOGLE DRIVE CONNECTED",error:"SYNC FAILED — tap to retry"};
  const c=colors[driveStatus];
  const dot=document.getElementById("home-drive-dot");
  const lbl=document.getElementById("home-drive-label");
  const btn=document.getElementById("btn-connect-home");
  if(dot){dot.style.background=c;}
  if(lbl){lbl.style.color=c;lbl.textContent=labels[driveStatus];}
  if(btn){btn.style.display=driveStatus==="connected"?"none":"inline";}
}

async function driveGet(path){
  const r=await fetch("https://www.googleapis.com/drive/v3"+path,
    {headers:{Authorization:"Bearer "+driveToken}});
  if(!r.ok)throw new Error("Drive GET failed: "+r.status);
  return r.json();
}
async function drivePost(path,body){
  const r=await fetch("https://www.googleapis.com/drive/v3"+path,
    {method:"POST",headers:{Authorization:"Bearer "+driveToken,"Content-Type":"application/json"},
     body:JSON.stringify(body)});
  if(!r.ok)throw new Error("Drive POST failed: "+r.status);
  return r.json();
}
async function driveUpload(fileId,data){
  const r=await fetch("https://www.googleapis.com/upload/drive/v3/files/"+fileId+"?uploadType=media",
    {method:"PATCH",headers:{Authorization:"Bearer "+driveToken,"Content-Type":"application/json"},
     body:JSON.stringify(data)});
  if(!r.ok)throw new Error("Drive upload failed: "+r.status);
}
async function driveCreateFile(name,folderId,data){
  const form=new FormData();
  form.append("metadata",new Blob([JSON.stringify({name,mimeType:"application/json",parents:[folderId]})],{type:"application/json"}));
  form.append("file",new Blob([JSON.stringify(data)],{type:"application/json"}));
  const r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {method:"POST",headers:{Authorization:"Bearer "+driveToken},body:form});
  if(!r.ok)throw new Error("Drive create failed: "+r.status);
  return r.json();
}

async function initDriveStorage(){
  // Find or create folder
  const q1=encodeURIComponent("name='Compost Logger' and mimeType='application/vnd.google-apps.folder' and trashed=false");
  const fr=await driveGet("/files?q="+q1+"&fields=files(id)");
  const folderId=fr.files?.length
    ?fr.files[0].id
    :(await drivePost("/files",{name:"Compost Logger",mimeType:"application/vnd.google-apps.folder"})).id;

  // Find or create data file
  const q2=encodeURIComponent("name='compost_data.json' and '"+folderId+"' in parents and trashed=false");
  const dr=await driveGet("/files?q="+q2+"&fields=files(id)");
  if(dr.files?.length){
    driveFileId=dr.files[0].id;
    // Load existing data
    const r=await fetch("https://www.googleapis.com/drive/v3/files/"+driveFileId+"?alt=media",
      {headers:{Authorization:"Bearer "+driveToken}});
    if(r.ok){
      const d=await r.json();
      if(d.piles){piles=d.piles||[];recipes=d.recipes||[];ingHist=d.ingHist||DEF_HIST;
        localStorage.setItem("ca_v4",JSON.stringify({piles,recipes,ingHist}));}
    }
  } else {
    const f=await driveCreateFile("compost_data.json",folderId,{piles,recipes,ingHist});
    driveFileId=f.id;
  }
}

async function onDriveToken(resp){
  if(resp.error){
    console.error("Drive auth error:",resp.error);
    driveStatus="error";updateDriveUI();return;
  }
  driveToken=resp.access_token;
  driveStatus="connecting";updateDriveUI();
  try{
    await initDriveStorage();
    driveStatus="connected";updateDriveUI();
    renderHome();
  }catch(ex){
    console.error("Drive init error:",ex);
    driveStatus="error";updateDriveUI();
  }
}

function connectDrive(){
  if(!tokenClient){
    alert("Google auth is still loading. Please wait a moment and try again.");return;
  }
  tokenClient.requestAccessToken({prompt:"consent"});
}

function scheduleDriveSave(){
  if(!driveFileId||!driveToken)return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      await driveUpload(driveFileId,{piles,recipes,ingHist});
      driveStatus="connected";updateDriveUI();
    }catch(ex){
      console.error("Drive save error:",ex);
      driveStatus="error";updateDriveUI();
      // Try to refresh token
      if(tokenClient)tokenClient.requestAccessToken({prompt:""});
    }
  },3000);
}

function initGoogleAuth(){
  const iv=setInterval(()=>{
    if(window.google?.accounts?.oauth2){
      clearInterval(iv);
      tokenClient=window.google.accounts.oauth2.initTokenClient({
        client_id:CLIENT_ID,
        scope:"https://www.googleapis.com/auth/drive.file",
        callback:onDriveToken
      });
    }
  },300);
}
