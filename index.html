<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Compost Academy Logger</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:Inter,sans-serif;-webkit-tap-highlight-color:transparent}
input,textarea{outline:none;font-family:Inter,sans-serif}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:0.5}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.card{background:#0a0a0a;border:1px solid #1e1e1e;border-radius:4px;padding:1rem;margin-bottom:1rem}
.hd{font-family:"Bebas Neue",cursive;letter-spacing:0.08em}
.mono{font-family:"Share Tech Mono",monospace}
.sec-label{font-size:0.65rem;letter-spacing:0.12em;color:#555;font-weight:600;margin-bottom:0.3rem;display:block}
.input{width:100%;padding:0.6rem 0.75rem;background:#050505;border:1px solid #222;border-radius:3px;color:#fff;font-size:0.9rem;box-sizing:border-box}
.btn-primary{width:100%;padding:0.75rem;background:#fff;color:#000;border:none;border-radius:3px;font-size:0.85rem;font-weight:600;letter-spacing:0.05em;cursor:pointer;font-family:Inter,sans-serif}
.btn-ghost{background:#050505;border:1px solid #222;color:#666;border-radius:3px;padding:0.3rem 0.75rem;cursor:pointer;font-size:0.72rem;font-family:Inter,sans-serif;letter-spacing:0.05em}
.pill{padding:0.05rem 0.3rem;border-radius:2px;font-size:0.65rem;font-family:"Share Tech Mono",monospace}
.sticky-header{position:sticky;top:0;background:#000;z-index:100;padding:0.75rem 1rem;border-bottom:1px solid #111;display:flex;justify-content:space-between;align-items:center}
.dropdown{position:absolute;top:100%;left:0;right:0;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:3px;z-index:999;max-height:180px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.9)}
.dropdown-item{padding:0.55rem 0.75rem;cursor:pointer;border-bottom:1px solid #111;color:#bbb;font-size:0.85rem}
.dropdown-item:hover{background:#111}
.progress-bar{height:5px;background:#111;border-radius:2px;margin-top:0.2rem}
.progress-fill{height:100%;border-radius:2px;transition:width 0.5s}
</style>
</head>

function getBand(t){if(!t||t<131)return null;return BANDS.find(b=>t>=b.min&&t<=b.max)||null;}
function mColor(p){if(!p)return”#222”;if(p>=60)return”#1565c0”;if(p>=50)return”#1e88e5”;if(p>=40)return”#4a90d9”;return”#7ab3e0”;}
function totVol(m){return Object.values(m).flat().reduce((s,i)=>s+(parseFloat(i.volume)||0),0);}
function catV(items){return items.reduce((s,i)=>s+(parseFloat(i.volume)||0),0);}

function calcTimer(entries){
if(!entries.length)return null;
const s=[…entries].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
const lat=s[s.length-1];const band=getBand(lat.core);
if(!band)return null;
if(band.hours===0)return{band,turnNow:true,deadline:null};
let streak=new Date(lat.timestamp);
for(let i=s.length-2;i>=0;i–){
const b=getBand(s[i].core);if(!b||b.label!==band.label)break;
streak=new Date(s[i].timestamp);
}
const elapsed=(new Date()-streak)/3600000;
const remaining=Math.max(0,band.hours-elapsed);
const progress=Math.min(100,(elapsed/band.hours)*100);
const deadline=new Date(streak.getTime()+band.hours*3600000);
return{band,elapsed,remaining,progress,complete:elapsed>=band.hours,turnNow:false,deadline};
}

function addToCalendar(name,deadline){
const fmt=d=>d.toISOString().replace(/[-:.]/g,””).slice(0,15)+“Z”;
const ics=[“BEGIN:VCALENDAR”,“VERSION:2.0”,“BEGIN:VEVENT”,
“DTSTART:”+fmt(deadline),“DTEND:”+fmt(new Date(deadline.getTime()+900000)),
“SUMMARY:Turn “+name,“DESCRIPTION:Pile ready to turn”,
“BEGIN:VALARM”,“TRIGGER:-PT30M”,“ACTION:DISPLAY”,“DESCRIPTION:30min reminder”,“END:VALARM”,
“END:VEVENT”,“END:VCALENDAR”].join(”\r\n”);
const a=document.createElement(“a”);
a.href=URL.createObjectURL(new Blob([ics],{type:“text/calendar”}));
a.download=“turn-”+name.replace(/\s+/g,”-”)+”.ics”;a.click();
}

// Drive API
const tok = () => window._driveToken;
async function dFetch(path,opts={}){
const r=await fetch(“https://www.googleapis.com/drive/v3”+path,{…opts,headers:{Authorization:“Bearer “+tok(),“Content-Type”:“application/json”,…(opts.headers||{})}});
return r.json();
}
async function dUploadMedia(id,data){
const r=await fetch(“https://www.googleapis.com/upload/drive/v3/files/”+id+”?uploadType=media”,
{method:“PATCH”,headers:{Authorization:“Bearer “+tok(),“Content-Type”:“application/json”},body:JSON.stringify(data)});
return r.json();
}
async function dCreateMulti(name,fid,data){
const meta={name,mimeType:“application/json”,parents:[fid]};
const form=new FormData();
form.append(“metadata”,new Blob([JSON.stringify(meta)],{type:“application/json”}));
form.append(“file”,new Blob([JSON.stringify(data)],{type:“application/json”}));
const r=await fetch(“https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart”,
{method:“POST”,headers:{Authorization:“Bearer “+tok()},body:form});
return r.json();
}
async function initDrive(){
const q=encodeURIComponent(“name='Compost Logger' and mimeType='application/vnd.google-apps.folder' and trashed=false”);
const fr=await dFetch(”/files?q=”+q+”&fields=files(id)”);
const fid=fr.files?.length?fr.files[0].id:(await dFetch(”/files”,{method:“POST”,body:JSON.stringify({name:FOLDER,mimeType:“application/vnd.google-apps.folder”})})).id;
const q2=encodeURIComponent(“name='compost_data.json' and '”+fid+”' in parents and trashed=false”);
const dr=await dFetch(”/files?q=”+q2+”&fields=files(id)”);
if(dr.files?.length)return{fileId:dr.files[0].id,isNew:false};
const nf=await dCreateMulti(FILE,fid,{piles:[],recipes:[],ingredientHistory:DEF_HIST});
return{fileId:nf.id,isNew:true};
}
async function readDrive(fileId){
const r=await fetch(“https://www.googleapis.com/drive/v3/files/”+fileId+”?alt=media”,
{headers:{Authorization:“Bearer “+tok()}});
return r.json();
}

function IngredientInput({value,onChange,category,history,placeholder}){
const[open,setOpen]=useState(false);
const[q,setQ]=useState(value||””);
const sugg=useMemo(()=>{
const h=history[category]||[];
return q?h.filter(x=>x.toLowerCase().includes(q.toLowerCase())&&x.toLowerCase()!==q.toLowerCase()).slice(0,8):h.slice(0,8);
},[q,history,category]);
useEffect(()=>setQ(value||””),[value]);
return e(“div”,{style:{position:“relative”}},
e(“input”,{className:“input”,value:q,placeholder,
onChange:ev=>{setQ(ev.target.value);onChange(ev.target.value);setOpen(true);},
onFocus:()=>setOpen(true),onBlur:()=>setTimeout(()=>setOpen(false),200)}),
open&&sugg.length>0&&e(“div”,{className:“dropdown”},
sugg.map(s=>e(“div”,{key:s,className:“dropdown-item”,
onMouseDown:()=>{setQ(s);onChange(s);setOpen(false);}},s))
)
);
}

if(“Notification”in window&&Notification.permission===“default”)Notification.requestPermission();
},[]);

const onToken=useCallback(async resp=>{
if(resp.error){setDriveStatus(“error”);setDriveError(resp.error);return;}
window._driveToken=resp.access_token;setDriveStatus(“connecting”);
try{
const{fileId,isNew}=await initDrive();fileRef.current=fileId;
if(!isNew){const d=await readDrive(fileId);if(d.piles){setPiles(d.piles||[]);setRecipes(d.recipes||[]);setHist(d.ingredientHistory||DEF_HIST);}}
setDriveStatus(“connected”);setLastSaved(new Date());
}catch(ex){setDriveStatus(“error”);setDriveError(“Connection failed.”);}
},[]);

useEffect(()=>{
const iv=setInterval(()=>{
if(window.google?.accounts?.oauth2){clearInterval(iv);
tcRef.current=window.google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:“https://www.googleapis.com/auth/drive.file”,callback:onToken});}
},300);return()=>clearInterval(iv);
},[onToken]);

const save=useCallback(data=>{
if(!fileRef.current||!window._driveToken)return;
clearTimeout(saveT.current);
saveT.current=setTimeout(async()=>{
try{await dUploadMedia(fileRef.current,data);setLastSaved(new Date());}
catch(ex){if(tcRef.current)tcRef.current.requestAccessToken({prompt:””});}
},3000);
},[]);

useEffect(()=>{if(driveStatus===“connected”)save({piles,recipes,ingredientHistory:hist});},[piles,recipes,hist,driveStatus,save]);

useEffect(()=>{
if(!pile)return;
const upd=()=>{
const t=calcTimer(pile.entries);setTimer(t);
if(t?.complete&&!notified){
if(“Notification”in window&&Notification.permission===“granted”)
new Notification(“Compost Academy”,{body:pile.name+” is ready to turn!”});
setNotified(true);
}
if(!t?.complete)setNotified(false);
};
upd();const id=setInterval(upd,60000);return()=>clearInterval(id);
},[pile,notified]);

const addHist=(cat,name)=>{
if(!name.trim())return;
setHist(h=>{const ex=h[cat]||[];if(ex.includes(name))return h;return{…h,[cat]:[name,…ex].slice(0,50)};});
};

const createPile=()=>{
if(!newName.trim())return;
CATS.forEach(c=>newMats2[c.key].forEach(i=>{if(i.name)addHist(c.key,i.name);}));
const p=makePile(newName.trim());p.materials=JSON.parse(JSON.stringify(newMats2));
setPiles(ps=>[…ps,p]);setActiveId(p.id);setNewName(””);setNewMats2(newMats());setView(“dashboard”);
};

const addEntry=()=>{
if(!form.core&&!form.top&&!form.bottom)return;
const entry={id:uid(),timestamp:new Date(form.date+“T”+form.time).toISOString(),
date:form.date,time:form.time,core:parseFloat(form.core)||null,top:parseFloat(form.top)||null,
bottom:parseFloat(form.bottom)||null,moisture:parseFloat(form.moisture)||null,
turned:form.turned,notes:form.notes};
setPiles(ps=>ps.map(p=>p.id===activeId?{…p,entries:[…p.entries,entry]}:p));
setForm(f=>({…f,core:””,top:””,bottom:””,moisture:””,turned:false,notes:””}));
};

const sorted=pile?[…pile.entries].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)):[];
const chartData=sorted.map((en,i)=>({
day:“D”+(i+1),core:en.core,top:en.top,bottom:en.bottom,
avg:(en.core&&en.top&&en.bottom)?+((en.core+en.top+en.bottom)/3).toFixed(1):null,
moisture:en.moisture,turned:en.turned
}));
const turnDays=chartData.filter(d=>d.turned).map(d=>d.day);
const tot=pile?totVol(pile.materials):0;
const dColor={disconnected:”#333”,connecting:”#f59e0b”,connected:”#4ade80”,error:”#ef4444”}[driveStatus];
const dLabel={disconnected:“NOT CONNECTED”,connecting:“CONNECTING…”,connected:“SYNCED”+(lastSaved?” “+lastSaved.toLocaleTimeString():””),error:driveError}[driveStatus];
const connectDrive=()=>{if(tcRef.current)tcRef.current.requestAccessToken({prompt:“consent”});};
