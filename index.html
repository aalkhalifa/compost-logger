};

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);

const makePile=(name)=>({id:uid(),name,created:new Date().toISOString(),materials:newMats(),entries:[],status:“active”});

function getBand(t){if(!t||t<131)return null;return TEMP_BANDS.find(b=>t>=b.min&&t<=b.max)||null;}
function mColor(p){if(!p)return”#222”;if(p>=60)return”#1565c0”;if(p>=50)return”#1e88e5”;if(p>=40)return”#4a90d9”;return”#7ab3e0”;}

function calcTimer(entries){
if(!entries.length)return null;
const s=[…entries].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
const lat=s[s.length-1];
const band=getBand(lat.core);
if(!band)return null;
if(band.hours===0)return{band,turnNow:true,deadline:null};
let streak=new Date(lat.timestamp);
for(let i=s.length-2;i>=0;i–){
const b=getBand(s[i].core);
if(!b||b.label!==band.label)break;
streak=new Date(s[i].timestamp);
}
const elapsed=(new Date()-streak)/3600000;
const remaining=Math.max(0,band.hours-elapsed);
const progress=Math.min(100,(elapsed/band.hours)*100);
const deadline=new Date(streak.getTime()+band.hours*3600000);
return{band,elapsed,remaining,progress,complete:elapsed>=band.hours,turnNow:false,deadline};
}

function totVol(m){return Object.values(m).flat().reduce((s,i)=>s+(parseFloat(i.volume)||0),0);}
function catV(items){return items.reduce((s,i)=>s+(parseFloat(i.volume)||0),0);}

function addToCalendar(pileName,deadline){
const fmt=d=>d.toISOString().replace(/[-:.]/g,””).slice(0,15)+“Z”;
const end=new Date(deadline.getTime()+900000);
const ics=[
“BEGIN:VCALENDAR”,“VERSION:2.0”,“PRODID:-//Compost Academy//Logger//EN”,
“BEGIN:VEVENT”,
“DTSTART:”+fmt(deadline),
“DTEND:”+fmt(end),
“SUMMARY:Turn “+pileName,
“DESCRIPTION:Compost pile ready to be turned”,
“BEGIN:VALARM”,“TRIGGER:-PT30M”,“ACTION:DISPLAY”,
“DESCRIPTION:30 min until turn time”,
“END:VALARM”,“END:VEVENT”,“END:VCALENDAR”
].join(”\r\n”);
const blob=new Blob([ics],{type:“text/calendar”});
const a=document.createElement(“a”);
a.href=URL.createObjectURL(blob);
a.download=“turn-”+pileName.replace(/\s+/g,”-”)+”.ics”;
a.click();
}

// Drive
async function dGet(path,tok){const r=await fetch(“https://www.googleapis.com/drive/v3”+path,{headers:{Authorization:“Bearer “+tok}});return r.json();}
async function dPost(path,body,tok){const r=await fetch(“https://www.googleapis.com/drive/v3”+path,{method:“POST”,headers:{Authorization:“Bearer “+tok,“Content-Type”:“application/json”},body:JSON.stringify(body)});return r.json();}
async function dUpload(id,content,tok){const r=await fetch(“https://www.googleapis.com/upload/drive/v3/files/”+id+”?uploadType=media”,{method:“PATCH”,headers:{Authorization:“Bearer “+tok,“Content-Type”:“application/json”},body:JSON.stringify(content)});return r.json();}
async function dCreate(name,fid,content,tok){
const meta={name,mimeType:“application/json”,parents:[fid]};
const form=new FormData();
form.append(“metadata”,new Blob([JSON.stringify(meta)],{type:“application/json”}));
form.append(“file”,new Blob([JSON.stringify(content)],{type:“application/json”}));
const r=await fetch(“https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart”,{method:“POST”,headers:{Authorization:“Bearer “+tok},body:form});
return r.json();
}
async function findFolder(tok){
const res=await dGet(”/files?q=name%3D'Compost+Logger' and mimeType%3D'application/vnd.google-apps.folder' and trashed%3Dfalse&fields=files(id)”,tok);
if(res.files?.length>0)return res.files[0].id;
const f=await dPost(”/files”,{name:FOLDER_NAME,mimeType:“application/vnd.google-apps.folder”},tok);
return f.id;
}
async function findDriveFile(fid,tok){
const res=await dGet(”/files?q=name%3D'compost_data.json' and '”+fid+”' in parents and trashed%3Dfalse&fields=files(id)”,tok);
if(res.files?.length>0)return{id:res.files[0].id,isNew:false};
const blank={piles:[],recipes:[],ingredientHistory:DEF_HISTORY};
const f=await dCreate(FILE_NAME,fid,blank,tok);
return{id:f.id,isNew:true};
}
async function readDriveFile(id,tok){const r=await fetch(“https://www.googleapis.com/drive/v3/files/”+id+”?alt=media”,{headers:{Authorization:“Bearer “+tok}});return r.json();}
